#          Expand-Archive -Path npcap-sdk.zip -DestinationPath $sdk_dir
#
#          $npcap_lib_path = ""
#          $path1 = Join-Path $sdk_dir "Lib/x64"
#          $path2 = Join-Path $sdk_dir "npcap-sdk-1.13/Lib/x64"
#
#          if (Test-Path (Join-Path $path1 "Packet.lib")) {
#            $npcap_lib_path = $path1
#          } elseif (Test-Path (Join-Path $path2 "Packet.lib")) {
#            $npcap_lib_path = $path2
#          } else {
#            echo "--- Listing extracted files for debugging ---"
#            Get-ChildItem -Path $sdk_dir -Recurse
