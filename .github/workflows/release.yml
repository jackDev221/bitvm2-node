      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          # (required)
          bin: bitvm2-noded
          archive: $bin-$target
          target: ${{ matrix.target }}
          tar: all
        env:
          # (required)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_PROFILE_RELEASE_LTO: true
